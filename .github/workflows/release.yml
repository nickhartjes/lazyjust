name: Release

on:
  push:
    tags:
      - "v*"

# Default workflow permissions are read-only; jobs that need to write
# release assets opt in explicitly (least privilege).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: release-test
      - run: cargo test --all-targets

  create-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

  upload-assets:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: release-build-${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: lazyjust
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: upload-assets
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
      REPO: nickhartjes/lazyjust
      TAP: nickhartjes/homebrew-tap
    steps:
      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.TAP }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          declare -A TARGETS=(
            [darwin_intel]=x86_64-apple-darwin
            [darwin_arm]=aarch64-apple-darwin
            [linux_intel]=x86_64-unknown-linux-gnu
            [linux_arm]=aarch64-unknown-linux-gnu
          )

          declare -A SHA
          for key in "${!TARGETS[@]}"; do
            target="${TARGETS[$key]}"
            SHA[$key]=$(curl -fsSL --proto-redir =https "${BASE}/lazyjust-${TAG}-${target}.sha256" | awk '{print $1}')
            echo "${key} ${target} ${SHA[$key]}"
          done

          cat > tap/Formula/lazyjust.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class Lazyjust < Formula
            desc "Lazy TUI for just — browse, search, and run recipes without memorizing commands"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_intel do
                url "${BASE}/lazyjust-${TAG}-${TARGETS[darwin_intel]}.tar.gz"
                sha256 "${SHA[darwin_intel]}"
              end
              on_arm do
                url "${BASE}/lazyjust-${TAG}-${TARGETS[darwin_arm]}.tar.gz"
                sha256 "${SHA[darwin_arm]}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE}/lazyjust-${TAG}-${TARGETS[linux_intel]}.tar.gz"
                sha256 "${SHA[linux_intel]}"
              end
              on_arm do
                url "${BASE}/lazyjust-${TAG}-${TARGETS[linux_arm]}.tar.gz"
                sha256 "${SHA[linux_arm]}"
              end
            end

            def install
              bin.install "lazyjust"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/lazyjust --version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lazyjust.rb
          if git diff --cached --quiet; then
            echo "No formula changes"
            exit 0
          fi
          git commit -m "lazyjust ${TAG#v}"
          git push
